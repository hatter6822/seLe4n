name = "seLe4n"
version = "0.29.14"
defaultTargets = ["sele4n"]

[[lean_lib]]
name = "SeLe4n"

[[lean_exe]]
name = "sele4n"
root = "Main"

[[lean_exe]]
name = "trace_sequence_probe"
root = "tests.TraceSequenceProbe"

[[lean_exe]]
name = "negative_state_suite"
root = "tests.NegativeStateSuite"

[[lean_exe]]
name = "information_flow_suite"
root = "tests.InformationFlowSuite"

[[lean_exe]]
name = "robin_hood_suite"
root = "tests.RobinHoodSuite"

[[lean_exe]]
name = "radix_tree_suite"
root = "tests.RadixTreeSuite"

[[lean_exe]]
name = "frozen_state_suite"
root = "tests.FrozenStateSuite"

[[lean_exe]]
name = "freeze_proof_suite"
root = "tests.FreezeProofSuite"

[[lean_exe]]
name = "frozen_ops_suite"
root = "tests.FrozenOpsSuite"

[[lean_exe]]
name = "two_phase_arch_suite"
root = "tests.TwoPhaseArchSuite"

# T1-I (M-TST-1): Register OperationChainSuite as a lean_exe target
# so it can be compiled and run via `lake exe operation_chain_suite`.
[[lean_exe]]
name = "operation_chain_suite"
root = "tests.OperationChainSuite"

# D1: Suspend/Resume test suite
[[lean_exe]]
name = "suspend_resume_suite"
root = "tests.SuspendResumeSuite"

# D2: Priority Management test suite
[[lean_exe]]
name = "priority_management_suite"
root = "tests.PriorityManagementSuite"

# D3: IPC Buffer Configuration test suite
[[lean_exe]]
name = "ipc_buffer_suite"
root = "tests.IpcBufferSuite"

# D4: Priority Inheritance Protocol test suite
[[lean_exe]]
name = "priority_inheritance_suite"
root = "tests.PriorityInheritanceSuite"

# D5: Bounded Latency / Liveness test suite
[[lean_exe]]
name = "liveness_suite"
root = "tests.LivenessSuite"

# T-03/AC6-A: Dedicated RegisterDecode + SyscallArgDecode test suite
[[lean_exe]]
name = "decoding_suite"
root = "tests.DecodingSuite"

# AG9-E: Badge Overflow Hardware Validation test suite
[[lean_exe]]
name = "badge_overflow_suite"
root = "tests.BadgeOverflowSuite"

# AK3-A.8: AsidPool regression suite (A-C01 CRITICAL)
[[lean_exe]]
name = "asid_pool_suite"
root = "tests.AsidPoolSuite"

# AK3-C.5 + AK3-L: Interrupt dispatch regression suite
[[lean_exe]]
name = "interrupt_dispatch_suite"
root = "tests.InterruptDispatchSuite"

# AK3-B: W^X four-layer defense regression suite
[[lean_exe]]
name = "wx_defense_suite"
root = "tests.WxDefenseSuite"

# AK3-E + AK3-J: Decode validation regression suite
[[lean_exe]]
name = "decode_validation_suite"
root = "tests.DecodeValidationSuite"

# AK4-G: End-to-end ABI round-trip integration suite
[[lean_exe]]
name = "abi_roundtrip_suite"
root = "tests.AbiRoundtripSuite"

# AK7: Foundational Model regression suite
[[lean_exe]]
name = "ak7_regression_suite"
root = "tests.Ak7RegressionSuite"
