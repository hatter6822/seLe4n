name = "seLe4n"
version = "0.30.4"
defaultTargets = ["sele4n"]

[[lean_lib]]
name = "SeLe4n"

[[lean_exe]]
name = "sele4n"
root = "Main"

[[lean_exe]]
name = "trace_sequence_probe"
root = "tests.TraceSequenceProbe"

[[lean_exe]]
name = "negative_state_suite"
root = "tests.NegativeStateSuite"

[[lean_exe]]
name = "information_flow_suite"
root = "tests.InformationFlowSuite"

[[lean_exe]]
name = "robin_hood_suite"
root = "tests.RobinHoodSuite"

[[lean_exe]]
name = "radix_tree_suite"
root = "tests.RadixTreeSuite"

[[lean_exe]]
name = "frozen_state_suite"
root = "tests.FrozenStateSuite"

[[lean_exe]]
name = "freeze_proof_suite"
root = "tests.FreezeProofSuite"

[[lean_exe]]
name = "frozen_ops_suite"
root = "tests.FrozenOpsSuite"

[[lean_exe]]
name = "two_phase_arch_suite"
root = "tests.TwoPhaseArchSuite"

# Operation-chain regression suite (compound syscall paths + CDT revocation).
[[lean_exe]]
name = "operation_chain_suite"
root = "tests.OperationChainSuite"

# Thread lifecycle: suspend/resume operations.
[[lean_exe]]
name = "suspend_resume_suite"
root = "tests.SuspendResumeSuite"

# Priority-management operations (set priority / MC priority).
[[lean_exe]]
name = "priority_management_suite"
root = "tests.PriorityManagementSuite"

# IPC-buffer configuration operation.
[[lean_exe]]
name = "ipc_buffer_suite"
root = "tests.IpcBufferSuite"

# Priority Inheritance Protocol regression suite.
[[lean_exe]]
name = "priority_inheritance_suite"
root = "tests.PriorityInheritanceSuite"

# Bounded-latency / liveness invariant surface suite.
[[lean_exe]]
name = "liveness_suite"
root = "tests.LivenessSuite"

# Register + syscall-argument decode regression suite.
[[lean_exe]]
name = "decoding_suite"
root = "tests.DecodingSuite"

# Badge overflow ABI round-trip regression suite.
[[lean_exe]]
name = "badge_overflow_suite"
root = "tests.BadgeOverflowSuite"

# ASID-pool allocator regression suite (rollover, free-list reuse,
# generation bump, flush discipline).
[[lean_exe]]
name = "asid_pool_suite"
root = "tests.AsidPoolSuite"

# Interrupt-dispatch regression suite (GIC-400 acknowledge → handle → EOI).
[[lean_exe]]
name = "interrupt_dispatch_suite"
root = "tests.InterruptDispatchSuite"

# W^X four-layer defense regression suite (wrapper, backend, VSpaceRoot,
# encode; SCTLR.WXN as hardware-level 4th gate).
[[lean_exe]]
name = "wx_defense_suite"
root = "tests.WxDefenseSuite"

# Decode-path validation (bounds-checked VSpace map/unmap and
# sched-context configure argument decoders).
[[lean_exe]]
name = "decode_validation_suite"
root = "tests.DecodeValidationSuite"

# End-to-end ABI round-trip integration suite.
[[lean_exe]]
name = "abi_roundtrip_suite"
root = "tests.AbiRoundtripSuite"

# Model integrity regression suite — kernel model type/kind/null discipline
[[lean_exe]]
name = "model_integrity_suite"
root = "tests.ModelIntegritySuite"

# AK9 platform regression suite — Phase AK9 Boot/DTB/MMIO audit remediation.
[[lean_exe]]
name = "ak9_platform_suite"
root = "tests.Ak9PlatformSuite"
