<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b2838;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0077b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#023e8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#023e8a;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="#0a1628" />
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.7" />

  <!-- Shield shape -->
  <path d="M256 68 L400 140 L400 280 Q400 380 256 448 Q112 380 112 280 L112 140 Z"
        fill="url(#shieldGrad)" stroke="url(#accentGrad)" stroke-width="2" />

  <!-- Inner shield highlight -->
  <path d="M256 88 L384 152 L384 276 Q384 366 256 428 Q128 366 128 276 L128 152 Z"
        fill="url(#innerGrad)" stroke="none" />

  <!-- Circuit traces - horizontal -->
  <g stroke="#00b4d8" stroke-width="1" opacity="0.2">
    <line x1="145" y1="200" x2="367" y2="200" />
    <line x1="160" y1="240" x2="352" y2="240" />
    <line x1="145" y1="320" x2="367" y2="320" />
    <line x1="170" y1="360" x2="342" y2="360" />
  </g>

  <!-- Circuit traces - vertical -->
  <g stroke="#00b4d8" stroke-width="1" opacity="0.2">
    <line x1="200" y1="140" x2="200" y2="400" />
    <line x1="256" y1="120" x2="256" y2="420" />
    <line x1="312" y1="140" x2="312" y2="400" />
  </g>

  <!-- Circuit nodes -->
  <g fill="#00b4d8" opacity="0.35">
    <circle cx="200" cy="200" r="3" />
    <circle cx="312" cy="200" r="3" />
    <circle cx="256" cy="240" r="3" />
    <circle cx="200" cy="320" r="3" />
    <circle cx="312" cy="320" r="3" />
    <circle cx="256" cy="360" r="3" />
    <circle cx="200" cy="240" r="2.5" />
    <circle cx="312" cy="240" r="2.5" />
    <circle cx="256" cy="200" r="2.5" />
    <circle cx="256" cy="320" r="2.5" />
  </g>

  <!-- Lock / verification symbol -->
  <g transform="translate(256,260)" filter="url(#glow)">
    <!-- Lock body -->
    <rect x="-28" y="-8" width="56" height="44" rx="6" ry="6"
          fill="none" stroke="#00b4d8" stroke-width="2.5" opacity="0.8" />
    <!-- Lock shackle -->
    <path d="M-16 -8 L-16 -28 Q-16 -46 0 -46 Q16 -46 16 -28 L16 -8"
          fill="none" stroke="#00b4d8" stroke-width="2.5" opacity="0.8" />
    <!-- Keyhole -->
    <circle cx="0" cy="12" r="7" fill="#00b4d8" opacity="0.6" />
    <rect x="-3" y="12" width="6" height="14" rx="2" fill="#00b4d8" opacity="0.6" />
  </g>

  <!-- Checkmark inside lock area -->
  <g transform="translate(256,258)" filter="url(#glow)">
    <polyline points="-8,12 -2,20 10,4" fill="none" stroke="#0a1628" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- "seLe4n" text -->
  <text x="256" y="170" text-anchor="middle" font-family="'Courier New', 'SF Mono', 'Fira Code', monospace"
        font-size="48" font-weight="bold" fill="#e0f7fa" letter-spacing="3" filter="url(#softGlow)">
    seLe4n
  </text>

  <!-- Subtitle -->
  <text x="256" y="408" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="#90e0ef" letter-spacing="4" opacity="0.7">
    FORMAL VERIFICATION
  </text>

  <!-- Lean 4 badge -->
  <g transform="translate(256,434)">
    <rect x="-32" y="-10" width="64" height="20" rx="10" fill="none" stroke="#0077b6" stroke-width="1" opacity="0.5" />
    <text x="0" y="4" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="11" fill="#90e0ef" opacity="0.6">
      Lean 4
    </text>
  </g>
</svg>
