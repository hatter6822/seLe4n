<!DOCTYPE html>
<!--
  seLe4n Observatory — Trace Theater (zero-dependency reference viewer).

  Loads the bundle built by scripts/build_observatory_data.py and renders
  the Execution layer: the deterministic trace as a stepper/scrubber, the
  subsystem-coloured event stream, and per-event detail with the Proof-Pivot
  rail. This is a contract-validating prototype; the production Observatory
  uses the React + TypeScript stack defined in the spec (§7).

  Build the data first, then serve this directory:
    python3 scripts/build_observatory_data.py
    cd web && python3 -m http.server 8080   # open /prototype/
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>seLe4n Observatory — Trace Theater</title>
<style>
  :root {
    --bg:#0f1420; --panel:#161c2b; --panel2:#1b2233; --border:#232c3f;
    --text:#d7dce6; --muted:#8a94a6; --accent:#5BA8FF;
    --ok:#38c172; --err:#e0a23c; --guard:#c98a5b; --inv:#9b7be0;
    --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:var(--sans); font-size:13px; }
  a { color:var(--accent); }
  .app { display:grid; height:100vh;
    grid-template-rows:auto 1fr auto;
    grid-template-columns:1fr; }
  /* header */
  header { display:flex; align-items:center; gap:18px; padding:8px 14px;
    background:var(--panel); border-bottom:1px solid var(--border); }
  header .brand { font-weight:600; letter-spacing:.2px; }
  header .brand small { color:var(--muted); font-weight:400; }
  .metrics { display:flex; gap:14px; margin-left:auto; flex-wrap:wrap; }
  .metric { text-align:center; line-height:1.1; }
  .metric b { display:block; font-size:14px; font-variant-numeric:tabular-nums; }
  .metric span { color:var(--muted); font-size:10px; text-transform:uppercase;
    letter-spacing:.5px; }
  .seal { color:var(--ok); border:1px solid var(--ok); border-radius:6px;
    padding:3px 8px; font-weight:600; }
  /* main 3-pane */
  .main { display:grid; grid-template-columns:260px 1fr 320px; min-height:0; }
  .pane { min-height:0; overflow:auto; }
  .stream { border-right:1px solid var(--border); }
  .center { border-right:1px solid var(--border); display:flex;
    flex-direction:column; min-height:0; }
  /* filters */
  .filters { display:flex; gap:8px; padding:8px; border-bottom:1px solid var(--border);
    background:var(--panel); position:sticky; top:0; align-items:center; flex-wrap:wrap; }
  .filters select, .filters input[type=text] { background:var(--panel2);
    color:var(--text); border:1px solid var(--border); border-radius:5px;
    padding:4px 6px; font-size:12px; }
  .filters label { color:var(--muted); display:flex; gap:4px; align-items:center; }
  /* event rows */
  .ev { display:grid; grid-template-columns:38px 10px 1fr 16px;
    gap:7px; align-items:center; padding:5px 8px; cursor:pointer;
    border-bottom:1px solid #1a2030; }
  .ev:hover { background:var(--panel2); }
  .ev.cur { background:#1d2740; outline:1px solid var(--accent); }
  .ev .seq { color:var(--muted); font-family:var(--mono); font-size:11px;
    text-align:right; }
  .ev .dot { width:9px; height:9px; border-radius:50%; }
  .ev .lbl { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ev .lbl .sid { color:var(--muted); font-family:var(--mono); font-size:11px;
    margin-right:6px; }
  .ev .oc { text-align:center; font-size:12px; }
  .oc-ok { color:var(--ok); } .oc-err { color:var(--err); }
  .oc-inv { color:var(--inv); }
  /* center stage */
  .stage { padding:14px; overflow:auto; }
  .stage h2 { margin:0 0 4px; font-size:15px; }
  .stage .cap { color:var(--muted); margin-bottom:14px; font-family:var(--mono); }
  .card { background:var(--panel); border:1px solid var(--border);
    border-radius:8px; padding:12px 14px; margin-bottom:12px; }
  .card h3 { margin:0 0 8px; font-size:12px; text-transform:uppercase;
    letter-spacing:.5px; color:var(--muted); }
  .kv { display:grid; grid-template-columns:130px 1fr; gap:4px 10px; }
  .kv .k { color:var(--muted); } .kv .v { font-family:var(--mono); word-break:break-word; }
  .reg { display:inline-block; background:#10243f; border:1px solid #2a4a73;
    color:#bfe0ff; border-radius:5px; padding:1px 7px; margin:2px 3px 0 0;
    font-family:var(--mono); }
  .badge-err { background:#3a2c10; border:1px solid #6b4e1d; color:#f0c987;
    border-radius:5px; padding:1px 7px; font-family:var(--mono); }
  /* subsystem distribution */
  .bars { display:flex; flex-direction:column; gap:4px; }
  .bar { display:grid; grid-template-columns:120px 1fr 42px; gap:8px;
    align-items:center; }
  .bar .nm { color:var(--muted); white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; }
  .bar .track { height:10px; background:var(--panel2); border-radius:5px; overflow:hidden; }
  .bar .fill { height:100%; }
  .bar .ct { text-align:right; font-family:var(--mono); color:var(--muted); }
  /* context rail */
  .rail { padding:12px; }
  .tabs { display:flex; gap:4px; margin-bottom:10px; }
  .tab { flex:1; text-align:center; padding:5px; border:1px solid var(--border);
    border-radius:6px; cursor:pointer; color:var(--muted); background:var(--panel); }
  .tab.on { color:var(--text); border-color:var(--accent); background:#16243c; }
  .pivot-note { color:var(--muted); font-style:italic; padding:10px;
    border:1px dashed var(--border); border-radius:6px; }
  .chip { display:inline-block; padding:2px 8px; border-radius:11px; font-size:11px;
    color:#0c1018; font-weight:600; }
  /* transport */
  .transport { display:flex; align-items:center; gap:10px; padding:8px 14px;
    background:var(--panel); border-top:1px solid var(--border); }
  .transport button { background:var(--panel2); color:var(--text);
    border:1px solid var(--border); border-radius:6px; width:34px; height:30px;
    cursor:pointer; font-size:14px; }
  .transport button:hover { border-color:var(--accent); }
  .transport input[type=range] { flex:1; accent-color:var(--accent); }
  .transport .count { font-family:var(--mono); color:var(--muted); min-width:90px;
    text-align:center; }
  .transport .cap2 { font-family:var(--mono); color:var(--muted);
    max-width:40%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .loading, .error { padding:30px; color:var(--muted); }
  .error { color:var(--err); }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="boot">Loading bundle… (run <code>python3 scripts/build_observatory_data.py</code> first, then serve <code>web/</code>)</div>
</div>
<script>
"use strict";
const DATA = "../public/data";
const state = { manifest:null, events:[], atlas:null, cur:0, playing:false,
  timer:null, speed:1, tab:"exec", filterSub:"", errorsOnly:false, q:"" };
const subColor = {};
const $ = (sel, el=document) => el.querySelector(sel);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

async function boot() {
  try {
    state.manifest = await (await fetch(`${DATA}/manifest.json`)).json();
    const t = state.manifest.traces[0];
    const trace = await (await fetch(`${DATA}/${t.eventsUrl}`)).json();
    state.events = trace.events;
    state.atlas = await (await fetch(`${DATA}/atlas/index.json`)).json();
    (state.manifest.subsystems||[]).forEach(s => subColor[s.id]=s.color);
    (state.atlas.subsystems||[]).forEach(s => subColor[s.id]=subColor[s.id]||s.color);
    renderShell();
    select(0);
  } catch (e) {
    $("#app").innerHTML = `<div class="error">Failed to load the data bundle.<br>` +
      `Run <code>python3 scripts/build_observatory_data.py</code>, then serve ` +
      `<code>web/</code> over http.<br><br>${esc(e.message)}</div>`;
  }
}

function renderShell() {
  const m = state.manifest, mt = m.metrics;
  const subs = [...new Set(state.events.map(e=>e.subsystem))].sort();
  $("#app").innerHTML = `
    <header>
      <div class="brand">seLe4n Observatory <small>· Trace Theater (prototype)</small></div>
      <div class="metrics">
        <div class="metric"><b>${esc(mt.modules)}</b><span>modules</span></div>
        <div class="metric"><b>${esc(mt.provedTheorems)}</b><span>theorems</span></div>
        <div class="metric"><b>${esc(mt.declarations)}</b><span>declarations</span></div>
        <div class="metric"><span class="seal">0 sorry / axiom</span></div>
        <div class="metric"><b>v${esc(m.kernelVersion)}</b><span>${esc(m.leanToolchain)}</span></div>
      </div>
    </header>
    <div class="main">
      <div class="pane stream">
        <div class="filters">
          <select id="fsub"><option value="">all subsystems</option>
            ${subs.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("")}</select>
          <label><input type="checkbox" id="ferr"> errors</label>
          <input type="text" id="fq" placeholder="search…" style="flex:1;min-width:60px">
        </div>
        <div id="evlist"></div>
      </div>
      <div class="pane center">
        <div class="stage" id="stage"></div>
      </div>
      <div class="pane rail" id="rail"></div>
    </div>
    <div class="transport">
      <button id="tFirst" title="first">⏮</button>
      <button id="tPrev" title="prev (←)">◀</button>
      <button id="tPlay" title="play/pause (space)">▶</button>
      <button id="tNext" title="next (→)">▶|</button>
      <button id="tLast" title="last">⏭</button>
      <span class="count" id="tCount"></span>
      <input type="range" id="tScrub" min="0" value="0">
      <span class="cap2" id="tCap"></span>
    </div>`;
  $("#fsub").onchange = e => { state.filterSub=e.target.value; renderStream(); };
  $("#ferr").onchange = e => { state.errorsOnly=e.target.checked; renderStream(); };
  $("#fq").oninput   = e => { state.q=e.target.value.toLowerCase(); renderStream(); };
  $("#tFirst").onclick=()=>select(0);
  $("#tPrev").onclick =()=>select(state.cur-1);
  $("#tNext").onclick =()=>select(state.cur+1);
  $("#tLast").onclick =()=>select(state.events.length-1);
  $("#tPlay").onclick = togglePlay;
  $("#tScrub").max = state.events.length-1;
  $("#tScrub").oninput = e => select(+e.target.value);
  document.onkeydown = ev => {
    if (ev.target.tagName==="INPUT") return;
    if (ev.key===" "){ev.preventDefault();togglePlay();}
    else if (ev.key==="ArrowLeft") select(state.cur-1);
    else if (ev.key==="ArrowRight") select(state.cur+1);
    else if (ev.key==="Home") select(0);
    else if (ev.key==="End") select(state.events.length-1);
  };
  renderStream();
  renderAtlasInto();
}

function visible(e) {
  if (state.filterSub && e.subsystem!==state.filterSub) return false;
  if (state.errorsOnly && e.outcome.status!=="expectedError") return false;
  if (state.q && !(e.text.toLowerCase().includes(state.q) ||
      e.scenarioId.toLowerCase().includes(state.q))) return false;
  return true;
}
function ocClass(e){ return e.outcome.status==="expectedError" ? "oc-err"
  : e.kind==="invariantCheck" ? "oc-inv" : "oc-ok"; }
function ocGlyph(e){ return e.outcome.status==="expectedError" ? "✗"
  : e.kind==="invariantCheck" ? "◆" : "✓"; }

function renderStream() {
  const html = state.events.filter(visible).map(e => `
    <div class="ev ${e.seq-1===state.cur?"cur":""}" data-i="${e.seq-1}">
      <span class="seq">${e.seq}</span>
      <span class="dot" style="background:${subColor[e.subsystem]||"#5A5F6B"}"></span>
      <span class="lbl"><span class="sid">${esc(e.scenarioId)}</span>${esc(e.label)}</span>
      <span class="oc ${ocClass(e)}">${ocGlyph(e)}</span>
    </div>`).join("");
  const list = $("#evlist"); list.innerHTML = html;
  list.querySelectorAll(".ev").forEach(d => d.onclick=()=>select(+d.dataset.i));
}

function valueHtml(e) {
  const v = e.value || {};
  if (v.type==="registers" || (v.type==="option" && Array.isArray(v.data)))
    return (v.data||[]).map(n=>`<span class="reg">${esc(n)}</span>`).join("")
           || `<span class="reg">∅</span>`;
  if (v.type==="error") return `<span class="badge-err">${esc(v.data)}</span>`;
  if (v.type==="bool") return v.data ? `<span class="oc-ok">true</span>`
                                     : `<span class="oc-err">false</span>`;
  return `<span>${esc(v.raw!==undefined?v.raw:(v.data!==undefined?v.data:""))}</span>`;
}

function select(i) {
  i = Math.max(0, Math.min(state.events.length-1, i));
  state.cur = i;
  state.events.forEach((e,k)=>{ const d=$(`.ev[data-i="${k}"]`);
    if(d) d.classList.toggle("cur", k===i); });
  const cur = $(`.ev[data-i="${i}"]`); if (cur) cur.scrollIntoView({block:"nearest"});
  $("#tScrub").value = i;
  $("#tCount").textContent = `step ${i+1} / ${state.events.length}`;
  const e = state.events[i];
  $("#tCap").textContent = `${e.scenarioId} · ${e.subsystem} · ${e.label}`;
  renderStage(e); renderRail(e);
}

function renderStage(e) {
  const chip = `<span class="chip" style="background:${subColor[e.subsystem]||"#5A5F6B"}">${esc(e.subsystem)}</span>`;
  $("#stage").innerHTML = `
    <h2>${chip} &nbsp;${esc(e.label)}</h2>
    <div class="cap">[${esc(e.scenarioId)}] ${esc(e.text)}</div>
    <div class="card"><h3>Checkpoint value</h3>
      <div>${valueHtml(e)}</div></div>
    <div class="card"><h3>Outcome</h3>
      <div class="${ocClass(e)}">${ocGlyph(e)} ${esc(e.outcome.status)}${
        e.outcome.error?` — <span class="badge-err">${esc(e.outcome.error)}</span>`:""}</div></div>
    <div class="card"><h3>Subsystem distribution (proved theorems)</h3>
      <div class="bars" id="atlasbars"></div></div>`;
  renderAtlasInto();
}

function renderAtlasInto() {
  const host = $("#atlasbars"); if (!host || !state.atlas) return;
  const subs = [...state.atlas.subsystems].sort((a,b)=>b.theoremCount-a.theoremCount).slice(0,12);
  const max = Math.max(...subs.map(s=>s.theoremCount), 1);
  host.innerHTML = subs.map(s=>`
    <div class="bar">
      <span class="nm">${esc(s.id)}</span>
      <span class="track"><span class="fill" style="width:${(100*s.theoremCount/max).toFixed(1)}%;background:${s.color}"></span></span>
      <span class="ct">${s.theoremCount}</span>
    </div>`).join("");
}

function renderRail(e) {
  const tab = (id,label)=>`<div class="tab ${state.tab===id?"on":""}" data-t="${id}">${label}</div>`;
  let body = "";
  if (state.tab==="exec") {
    body = `<div class="card"><h3>Execution</h3><div class="kv">
      <span class="k">scenario</span><span class="v">${esc(e.scenarioId)}</span>
      <span class="k">subsystem</span><span class="v">${esc(e.subsystem)}</span>
      <span class="k">kind</span><span class="v">${esc(e.kind)}</span>
      <span class="k">source module</span><span class="v">${esc(e.sourceModule||"—")}</span>
      <span class="k">source fn</span><span class="v">${esc(e.sourceFn||"—")}</span>
      <span class="k">registered</span><span class="v">${e.registered?"yes":"no"}</span>
    </div></div>`;
  } else if (state.tab==="state") {
    body = `<div class="pivot-note">State inspection needs the E2 state-snapshot
      exporter (spec §6.2 / roadmap P2). The byte-stable trace records this
      checkpoint's value (shown in the stage), but not yet the full object
      heap. Coming next.</div>`;
  } else {
    body = `<div class="pivot-note">Proof pivot needs the E3 proof index
      (spec §6.2 / roadmap P3): the invariant this transition preserves and
      the theorem that discharges it. The headline guarantee is live in the
      header — 0 <code>sorry</code> / <code>axiom</code> across
      ${esc(state.manifest.metrics.provedTheorems)} theorems.</div>`;
  }
  $("#rail").innerHTML = `
    <div class="tabs">${tab("exec","Execution")}${tab("state","State")}${tab("proof","Proof")}</div>
    ${body}`;
  $("#rail").querySelectorAll(".tab").forEach(t =>
    t.onclick=()=>{ state.tab=t.dataset.t; renderRail(state.events[state.cur]); });
}

function togglePlay() {
  state.playing = !state.playing;
  $("#tPlay").textContent = state.playing ? "⏸" : "▶";
  if (state.timer) { clearInterval(state.timer); state.timer=null; }
  if (state.playing) state.timer = setInterval(() => {
    if (state.cur >= state.events.length-1) { togglePlay(); return; }
    select(state.cur+1);
  }, 450/state.speed);
}

boot();
</script></body></html>
