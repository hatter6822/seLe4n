name: Lean Toolchain Update Proposal

on:
  schedule:
    - cron: '12 5 * * 1'
  workflow_dispatch:

permissions:
  # AN11-F (LOW) audit: this workflow OPENS A NOTIFICATION ISSUE only —
  # it has no `contents: write`, no `pull-requests: write`, no
  # `actions: write`.  Branch-protection rules on `main` therefore cannot
  # be bypassed by this workflow:  even if it were compromised, the most
  # it can do is post a (read-only-content-derived) issue.  Manual review
  # remains required for every actual toolchain bump.
  contents: read
  issues: write

jobs:
  propose-lean-toolchain-update:
    name: Propose Lean toolchain update
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compare pinned Lean toolchain against upstream release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs')
            const path = 'lean-toolchain'
            const localRaw = fs.readFileSync(path, 'utf8').trim()
            const localVersion = localRaw.split(':').pop()

            const { data: release } = await github.rest.repos.getLatestRelease({
              owner: 'leanprover',
              repo: 'lean4'
            })
            const latestTag = release.tag_name
            const tagPattern = /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/

            core.info(`Pinned toolchain: ${localRaw}`)
            core.info(`Latest lean4 release: ${latestTag}`)

            if (!tagPattern.test(latestTag)) {
              core.setFailed(`Unexpected lean4 release tag format: ${latestTag}`)
              return
            }

            if (localVersion === latestTag) {
              core.info('Toolchain is already up to date; no proposal issue will be created.')
              return
            }

            const issueTitle = `WS-B10: bump lean-toolchain from ${localVersion} to ${latestTag}`
            const owner = context.repo.owner
            const repo = context.repo.repo
            const query = `repo:${owner}/${repo} is:issue is:open in:title \"${issueTitle}\"`
            const { data: search } = await github.rest.search.issuesAndPullRequests({ q: query })

            if (search.total_count > 0) {
              core.info(`Existing open proposal already present: ${issueTitle}`)
              return
            }

            const body = [
              'Automated WS-B10 toolchain update proposal generated by `.github/workflows/lean_toolchain_update_proposal.yml`.',
              '',
              `- Current pinned version: \`${localRaw}\``,
              `- Latest upstream release: \`${latestTag}\``,
              '',
              '## Required validation before merge',
              '- [ ] `./scripts/test_fast.sh`',
              '- [ ] `./scripts/test_smoke.sh`',
              '- [ ] `./scripts/test_full.sh`',
              '- [ ] `NIGHTLY_ENABLE_EXPERIMENTAL=1 ./scripts/test_nightly.sh`',
              '- [ ] Update `CHANGELOG.md` and patch version if merged as part of another WS slice',
              '',
              '## Notes',
              '- This issue is informational and does not auto-edit the repository.',
              '- Close as \"not planned\" if upstream release should be deferred for stability reasons.'
            ].join('\n')

            await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body,
              labels: ['dependencies', 'ci', 'ws-b10']
            })

