name: Nightly Determinism

on:
  schedule:
    - cron: '22 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-tier4:
    name: Tiered Tests / Nightly (Tier 0-4)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Lean and Lake caches
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-${{ runner.arch }}-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run nightly gate with deterministic replay candidates
        env:
          NIGHTLY_ENABLE_EXPERIMENTAL: '1'
        run: ./scripts/ci_capture_timing.sh nightly ./scripts/test_nightly.sh

      - name: Collect nightly smoke flake telemetry (default 3 attempts)
        run: ./scripts/ci_flake_probe.sh nightly-smoke-repeat ./scripts/test_smoke.sh

      - name: Upload nightly trace artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nightly-trace-artifacts
          path: tests/artifacts/nightly/

      - name: Upload nightly CI telemetry
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-telemetry-nightly
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore
