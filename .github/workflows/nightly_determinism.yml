name: Nightly Determinism

# AN11-F (LOW) audit scope clarification:
#
# **What this workflow actually verifies**: same-run determinism — running
# `lake exe sele4n` twice in the same job produces byte-identical trace
# output (`tests/artifacts/nightly/sele4n_run1.trace` ≡ `…/sele4n_run2.trace`).
# The diff is captured at `…/sele4n_determinism.diff` and uploaded.
#
# **What it does NOT verify**: cross-commit determinism (today's trace
# matching yesterday's trace).  That stronger check would require either
# downloading the previous run's artifacts via `actions/download-artifact`
# or maintaining a fixture inside the repo.  Implemented today as the
# `tests/fixtures/main_trace_smoke.expected` fixture (gated by Tier 2)
# which runs on every PR — so cross-commit determinism IS gated, just
# not in this nightly job.

on:
  schedule:
    - cron: '22 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-tier4:
    name: Tiered Tests / Nightly (Tier 0-4)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Lean and Lake caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          # AN11-F (LOW): job-tagged cache key (nightly lane).  Falls back
          # to the full lane's cache when the nightly key misses.
          key: ${{ runner.os }}-${{ runner.arch }}-lean-nightly-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-nightly-
            ${{ runner.os }}-${{ runner.arch }}-lean-full-
            ${{ runner.os }}-${{ runner.arch }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run nightly gate with deterministic replay candidates
        env:
          NIGHTLY_ENABLE_EXPERIMENTAL: '1'
        run: ./scripts/ci_capture_timing.sh nightly ./scripts/test_nightly.sh

      - name: Collect nightly smoke flake telemetry (default 3 attempts)
        run: ./scripts/ci_flake_probe.sh nightly-smoke-repeat ./scripts/test_smoke.sh

      - name: Upload nightly trace artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-trace-artifacts
          path: tests/artifacts/nightly/

      - name: Upload nightly CI telemetry
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-telemetry-nightly
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore
