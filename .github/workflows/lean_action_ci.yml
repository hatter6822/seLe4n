name: Lean Action CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-action-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-fast:
    name: Tiered Tests / Fast (Tier 0 + Tier 1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Lean and Lake caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          # AN11-F (LOW): job-tagged cache key.  The fast / smoke / full /
          # nightly jobs build different target sets (`.lake/build` content
          # diverges); a shared key would let one job's smaller cache
          # overwrite another's larger cache, forcing a full recompile on
          # the lower-coverage job's next run.  Tag the key with `-fast`
          # so each job owns its own `.lake/build` slice.  The
          # `restore-keys` fallback still lets a fresh job seed off any
          # prior cache for the same Lean toolchain.
          key: ${{ runner.os }}-${{ runner.arch }}-lean-fast-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-fast-
            ${{ runner.os }}-${{ runner.arch }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      # AN1-B.3 (C-03): confirm setup_lean_env.sh installed the pre-commit hook.
      # On CI the checkout is fresh, so this asserts the installer actually ran
      # end-to-end — a regression (e.g. setup_lean_env exits early before the
      # install step) would fail the lane with an actionable message.
      - name: Verify pre-commit hook installed
        run: ./scripts/install_git_hooks.sh --check

      # AF6-F: Install shellcheck so Tier 0 hygiene runs shell lint instead of
      # skipping it. shellcheck is not in the default ubuntu-latest image.
      # ripgrep is pre-installed on ubuntu-latest but not on ubuntu-24.04-arm;
      # install it here defensively so both lanes share the same prereqs.
      #
      # AN11-E.8 (TST-M08): wrap apt-get in a 3-attempt retry with
      # exponential backoff (2s, 4s, 8s).  Transient archive-mirror
      # flakes are common and otherwise produce CI noise unrelated to the
      # PR under test.
      - name: Install shellcheck and ripgrep
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if sudo apt-get update -qq && \
               sudo apt-get install -y -qq shellcheck ripgrep; then
              echo "[apt-get] succeeded on attempt ${attempt}"
              break
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "[apt-get] failed after 3 attempts" >&2
              exit 1
            fi
            backoff=$((2 ** attempt))
            echo "[apt-get] attempt ${attempt} failed; sleeping ${backoff}s" >&2
            sleep "${backoff}"
          done

      - name: Run fast gate
        run: ./scripts/ci_capture_timing.sh fast ./scripts/test_fast.sh

      - name: Upload CI telemetry (fast lane)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-telemetry-fast
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore

  test-smoke:
    name: Tiered Tests / Smoke (Tier 2)
    runs-on: ubuntu-latest
    needs: test-fast

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Lean and Lake caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          # AN11-F (LOW): job-tagged cache key (smoke lane).  See the
          # comment at test-fast above for the rationale.
          key: ${{ runner.os }}-${{ runner.arch }}-lean-smoke-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-smoke-
            ${{ runner.os }}-${{ runner.arch }}-lean-fast-
            ${{ runner.os }}-${{ runner.arch }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Validate scenario catalog
        run: python3 scripts/scenario_catalog.py validate

      - name: Run Tier 2 trace checks
        env:
          TRACE_ARTIFACT_DIR: .ci-artifacts/trace
        run: ./scripts/ci_capture_timing.sh smoke-trace ./scripts/test_tier2_trace.sh

      - name: Run Tier 2 negative-state checks
        run: ./scripts/ci_capture_timing.sh smoke-negative ./scripts/test_tier2_negative.sh

      - name: Run documentation sync checks (M-19)
        env:
          DOCS_SYNC_SKIP_LEAN_SETUP: '1'
        run: ./scripts/ci_capture_timing.sh docs-sync ./scripts/test_docs_sync.sh

      - name: Upload trace fixture diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trace-fixture-diagnostics
          path: |
            .ci-artifacts/trace/
            tests/fixtures/main_trace_smoke.expected

      - name: Upload CI telemetry (smoke lane)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-telemetry-smoke
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore

  test-full:
    name: Tiered Tests / Full (Tier 3)
    runs-on: ubuntu-latest
    needs: test-smoke

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Lean and Lake caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          # AN11-F (LOW): job-tagged cache key (full lane).  Tier 3 builds
          # the broadest set of targets, so its `.lake/build` is the
          # canonical seed for the smaller smoke / fast lanes.
          key: ${{ runner.os }}-${{ runner.arch }}-lean-full-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-full-
            ${{ runner.os }}-${{ runner.arch }}-lean-smoke-
            ${{ runner.os }}-${{ runner.arch }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Build (ensure oleans are up-to-date for #check anchors)
        run: source ~/.elan/env && lake build

      - name: Run Tier 3 invariant surface checks
        run: ./scripts/ci_capture_timing.sh full ./scripts/test_tier3_invariant_surface.sh

      - name: Upload CI telemetry (full lane)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-telemetry-full
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore

  test-rust:
    name: Rust ABI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # AA2-A (H-4): SHA-pinned Rust toolchain action replaces curl-pipe install.
      # Pin: dtolnay/rust-toolchain master (must be a master-branch commit per
      # the action's docs — non-master SHAs get garbage-collected).
      # To update: git ls-remote https://github.com/dtolnay/rust-toolchain.git master
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.82.0

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: rust
        run: cargo test --workspace
