name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-fast:
    name: Tiered Tests / Fast (Tier 0 + Tier 1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run fast gate
        run: ./scripts/test_fast.sh

  test-smoke:
    name: Tiered Tests / Smoke (Tier 0 + Tier 1 + Tier 2)
    runs-on: ubuntu-latest
    needs: test-fast

    steps:
      - uses: actions/checkout@v5

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run smoke gate
        env:
          TRACE_ARTIFACT_DIR: .ci-artifacts/trace
        run: ./scripts/test_smoke.sh

      - name: Upload trace fixture diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trace-fixture-diagnostics
          path: |
            .ci-artifacts/trace/
            tests/fixtures/main_trace_smoke.expected
