name: Lean Action CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lean-action-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-fast:
    name: Tiered Tests / Fast (Tier 0 + Tier 1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Restore Lean and Lake caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run fast gate
        run: ./scripts/test_fast.sh

  test-smoke:
    name: Tiered Tests / Smoke (Tier 0 + Tier 1 + Tier 2)
    runs-on: ubuntu-latest
    needs: test-fast

    steps:
      - uses: actions/checkout@v5

      - name: Restore Lean and Lake caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run smoke gate
        env:
          TRACE_ARTIFACT_DIR: .ci-artifacts/trace
        run: ./scripts/test_smoke.sh

      - name: Upload trace fixture diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trace-fixture-diagnostics
          path: |
            .ci-artifacts/trace/
            tests/fixtures/main_trace_smoke.expected

  test-full:
    name: Tiered Tests / Full (Tier 0 + Tier 1 + Tier 2 + Tier 3)
    runs-on: ubuntu-latest
    needs: test-smoke

    steps:
      - uses: actions/checkout@v5

      - name: Restore Lean and Lake caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run full gate
        run: ./scripts/test_full.sh
