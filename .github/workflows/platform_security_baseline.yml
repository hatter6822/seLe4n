name: Platform and Security Baseline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '38 4 * * 1'
  workflow_dispatch:

concurrency:
  group: platform-security-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  architecture-arm64-fast:
    name: Platform Signal / ARM64 Fast Gate
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Lean and Lake caches
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        env:
          # ARM runners frequently time out while restoring very large .lake/build archives.
          # Extend per-segment timeout to reduce transient "The operation was canceled" cache failures.
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: '30'
        with:
          path: |
            ~/.elan
            .lake/packages
          key: ${{ runner.os }}-${{ runner.arch }}-lean-nobuild-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-nobuild-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      # Tier 0 hygiene uses `rg` (ripgrep) in marker scans and the AL0
      # cascade-baseline script; install it here since it is not in the
      # default ubuntu-24.04-arm image. shellcheck likewise absent from
      # the ARM image — install it so Tier 0 hygiene runs shell lint.
      - name: Install shellcheck and ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck ripgrep

      # Tier 0 hygiene only checks cheap rg-based monotonicity metrics.
      # Lake build, the ak7 regression suite, and the Rust workspace tests
      # already run in dedicated CI jobs (Tier 1, Tier 2, Rust ABI Tests) —
      # re-running them inside the monotonicity baseline script would
      # duplicate work and, on runners that ship cargo without the pinned
      # Rust toolchain, fail at `cargo test` before the hygiene checks can
      # finish. Opt out via the `AL0_SKIP_*` env vars the baseline script
      # already documents; the monotonicity guard treats `SKIPPED` as a pass.
      - name: Run architecture-targeted fast gate
        env:
          AL0_SKIP_BUILD: '1'
          AL0_SKIP_AK7: '1'
          AL0_SKIP_CARGO: '1'
        run: ./scripts/ci_capture_timing.sh arm64-fast ./scripts/test_fast.sh

      - name: Upload CI telemetry (arm64 lane)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-telemetry-arm64-fast
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore

  security-baseline-scan:
    name: Security Signal / Secret + Dependency + CodeQL
    # security-events upload is not available to fork-origin pull_request runs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy repository vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          languages: actions

      - name: Run CodeQL analysis (informational; see docs/CI_POLICY.md)
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        continue-on-error: true
