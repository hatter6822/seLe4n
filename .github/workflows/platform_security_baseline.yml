name: Platform and Security Baseline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '38 4 * * 1'
  workflow_dispatch:

concurrency:
  group: platform-security-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  architecture-arm64-fast:
    name: Platform Signal / ARM64 Fast Gate
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Restore Lean and Lake caches
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: |
            ~/.elan
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-${{ runner.arch }}-lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run architecture-targeted fast gate
        run: ./scripts/ci_capture_timing.sh arm64-fast ./scripts/test_fast.sh

      - name: Upload CI telemetry (arm64 lane)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-telemetry-arm64-fast
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore

  security-baseline-scan:
    name: Security Signal / Secret + Dependency + CodeQL
    # security-events upload is not available to fork-origin pull_request runs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy repository vulnerability scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # 0.34.1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@bb471cdcf4dda2c934c5b656f554d43c1434ed13 # v4
        with:
          languages: actions

      - name: Run CodeQL analysis (informational; see docs/CI_POLICY.md)
        uses: github/codeql-action/analyze@bb471cdcf4dda2c934c5b656f554d43c1434ed13 # v4
        continue-on-error: true
