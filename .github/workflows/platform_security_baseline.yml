name: Platform and Security Baseline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '38 4 * * 1'
  workflow_dispatch:

concurrency:
  group: platform-security-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  architecture-arm64-fast:
    name: Platform Signal / ARM64 Fast Gate
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Lean and Lake caches
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        env:
          # ARM runners frequently time out while restoring very large .lake/build archives.
          # Extend per-segment timeout to reduce transient "The operation was canceled" cache failures.
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: '30'
        with:
          path: |
            ~/.elan
            .lake/packages
          key: ${{ runner.os }}-${{ runner.arch }}-lean-nobuild-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-nobuild-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      - name: Run architecture-targeted fast gate
        run: ./scripts/ci_capture_timing.sh arm64-fast ./scripts/test_fast.sh

      - name: Upload CI telemetry (arm64 lane)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-telemetry-arm64-fast
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore

  security-baseline-scan:
    name: Security Signal / Secret + Dependency + CodeQL
    # security-events upload is not available to fork-origin pull_request runs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy repository vulnerability scan
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # 0.34.1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          languages: actions

      - name: Run CodeQL analysis (informational; see docs/CI_POLICY.md)
        uses: github/codeql-action/analyze@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        continue-on-error: true
