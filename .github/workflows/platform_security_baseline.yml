name: Platform and Security Baseline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '38 4 * * 1'
  workflow_dispatch:

concurrency:
  group: platform-security-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  architecture-arm64-fast:
    name: Platform Signal / ARM64 Fast Gate
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Restore Lean and Lake caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        env:
          # ARM runners frequently time out while restoring very large .lake/build archives.
          # Extend per-segment timeout to reduce transient "The operation was canceled" cache failures.
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: '30'
        with:
          path: |
            ~/.elan
            .lake/packages
          key: ${{ runner.os }}-${{ runner.arch }}-lean-nobuild-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml', 'scripts/setup_lean_env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-lean-nobuild-

      - name: Setup Lean toolchain
        run: ./scripts/setup_lean_env.sh

      # Tier 0 hygiene uses `rg` (ripgrep) for marker scans; install it
      # here since it is not in the default ubuntu-24.04-arm image.
      # shellcheck likewise absent from the ARM image — install it so
      # Tier 0 hygiene runs shell lint.
      - name: Install shellcheck and ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck ripgrep

      - name: Run architecture-targeted fast gate
        run: ./scripts/ci_capture_timing.sh arm64-fast ./scripts/test_fast.sh

      - name: Upload CI telemetry (arm64 lane)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-telemetry-arm64-fast
          path: .ci-artifacts/telemetry/
          if-no-files-found: ignore

  security-baseline-scan:
    name: Security Signal / Secret + Dependency + CodeQL
    # security-events upload is not available to fork-origin pull_request runs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # AN11-E.4 (TST-M04): Prefer the per-action `github.token` over
          # `secrets.GITHUB_TOKEN` — both resolve to the same automatic
          # token, but `github.token` is the canonical contextual form
          # documented under github-actions and avoids an unnecessary
          # secrets-scope read.
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Trivy repository vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: actions

      - name: Run CodeQL analysis (informational; see docs/CI_POLICY.md)
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        continue-on-error: true
