name: Codebase Map Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codebase-map-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-codebase-map:
    name: Refresh docs/codebase_map.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate codebase map
        run: ./scripts/generate_codebase_map.py --pretty

      - name: Commit updated codebase map
        run: |
          if git diff --quiet -- docs/codebase_map.json; then
            echo "docs/codebase_map.json already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/codebase_map.json
          git commit -m "ci: refresh codebase map"
          git push
